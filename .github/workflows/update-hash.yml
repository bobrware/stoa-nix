name: Update AppImage Hash

on:
  repository_dispatch:
    types: [new-release]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to update (e.g., 0.1.0)"
        required: false
        type: string

jobs:
  update-hash:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get version from workflow dispatch or payload
        id: version
        run: |
          if [ -z "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.client_payload.version }}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Download AppImage and calculate hash
        id: hash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SYSTEM_PLATFORM="x86_64-linux"
          EXTENSION="AppImage"
          URL="https://s3.stoa.gg/stoa/releases/${VERSION}/${SYSTEM_PLATFORM}/stoa.${EXTENSION}"

          echo "Downloading from: $URL"
          wget -O /tmp/stoa.AppImage "$URL"

          SHA256=$(sha256sum /tmp/stoa.AppImage | awk '{print $1}')
          echo "sha256=$SHA256" >> $GITHUB_OUTPUT
          echo "platform=$SYSTEM_PLATFORM" >> $GITHUB_OUTPUT
          echo "extension=$EXTENSION" >> $GITHUB_OUTPUT
          echo "Downloaded AppImage hash: $SHA256"

      - name: Update flake.nix
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SHA256="${{ steps.hash.outputs.sha256 }}"

          sed -i "s/version = \"[^\"]*\";/version = \"${VERSION}\";/" flake.nix
          sed -i "s/sha256 = \"[^\"]*\";/sha256 = \"${SHA256}\";/" flake.nix

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add flake.nix
          git commit -m "chore: update AppImage hash to ${{ steps.hash.outputs.sha256 }} for version ${{ steps.version.outputs.version }}"
          git push origin main
